<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2f7f33",
              "background-light": "#f6f8f6",
              "background-dark": "#0a120b",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>Mise à jour Statut Livraison</title>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<!-- Container for Demo Purposes (simulating a background app) -->
<div class="relative min-h-screen w-full overflow-hidden flex flex-col">
<!-- Mock Background App Content -->
<div class="p-4 flex flex-col gap-4 opacity-40 grayscale pointer-events-none">
<div class="flex justify-between items-center">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">menu</span>
<span class="font-bold text-slate-900 dark:text-slate-100">Détails de la course</span>
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">notifications</span>
</div>
<div class="h-48 w-full bg-primary/10 rounded-xl" data-location="Ouagadougou"></div>
<div class="space-y-3">
<div class="h-4 w-3/4 bg-slate-300 dark:bg-slate-700 rounded"></div>
<div class="h-4 w-1/2 bg-slate-300 dark:bg-slate-700 rounded"></div>
</div>
</div>
<!-- Bottom Sheet Overlay -->
<div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm flex flex-col justify-end">
<!-- Modal Container (BottomSheet Style) -->
<div class="bg-white dark:bg-[#0f1a10] rounded-t-3xl w-full max-w-lg mx-auto shadow-2xl overflow-hidden">
<!-- BottomSheetHandle -->
<div class="flex h-8 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-slate-300 dark:bg-white/10"></div>
</div>
<!-- Header -->
<div class="relative flex items-center px-4 pb-4 pt-2">
<button class="text-slate-600 dark:text-slate-400 p-2 absolute left-4">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold w-full text-center">Mise à jour du statut</h2>
</div>
<!-- Content Area -->
<div class="px-6 pb-8 pt-4 flex flex-col items-center text-center">
<!-- Big Check Icon -->
<div class="size-24 rounded-full bg-primary/10 flex items-center justify-center mb-8">
<div class="size-16 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-white !text-4xl font-bold">check</span>
</div>
</div>
<h3 class="text-slate-900 dark:text-white text-2xl font-bold leading-tight mb-3">Livraison effectuée ?</h3>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed mb-8 max-w-xs">
                        Confirmez que vous avez remis la marchandise à l'acheteur à destination.
                    </p>
<!-- Checkbox Confirmation -->
<div class="w-full bg-slate-50 dark:bg-white/5 p-4 rounded-xl border border-slate-200 dark:border-white/10 flex items-start gap-3 mb-4 text-left">
<div class="flex items-center pt-0.5">
<input checked="" class="h-5 w-5 rounded border-slate-300 text-primary focus:ring-primary bg-white dark:bg-[#0f1a10] dark:border-white/20" id="confirm" type="checkbox"/>
</div>
<label class="text-slate-800 dark:text-slate-300 text-sm font-medium leading-snug" for="confirm">
                            J'ai remis la marchandise à Fatima T. à Ouagadougou, Secteur 15
                        </label>
</div>
<!-- Payout Note -->
<div class="w-full bg-primary/5 dark:bg-primary/10 p-4 rounded-xl border border-primary/20 flex items-center gap-3 mb-8">
<span class="material-symbols-outlined text-primary">payments</span>
<p class="text-primary dark:text-primary text-sm font-medium text-left">
                            10 000 FCFA seront immédiatement crédités sur votre portefeuille.
                        </p>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-4">
<button class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl transition-all shadow-lg shadow-primary/20">
                            Confirmer la livraison
                        </button>
<button class="w-full py-2 bg-transparent text-slate-500 dark:text-slate-400 font-medium hover:text-slate-700 dark:hover:text-slate-200 transition-colors">
                            Annuler
                        </button>
</div>
</div>
<!-- Bottom Safety Spacer -->
<div class="h-6"></div>
</div>
</div>
</div>
</body></html>
