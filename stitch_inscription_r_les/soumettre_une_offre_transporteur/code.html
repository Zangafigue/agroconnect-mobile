<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a34a",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 z-50 flex items-end justify-center bg-slate-900/60 backdrop-blur-sm">
<!-- Bottom Sheet Container -->
<div class="w-full max-w-xl bg-background-dark rounded-t-xl shadow-2xl border-t border-primary/10 flex flex-col overflow-hidden">
<!-- Drag Handle -->
<div class="flex h-6 w-full items-center justify-center cursor-grab active:cursor-grabbing">
<div class="h-1.5 w-12 rounded-full bg-slate-700"></div>
</div>
<!-- Header -->
<div class="px-6 py-4 flex items-center justify-between border-b border-white/5">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl">edit_note</span>
<h2 class="text-slate-100 text-xl font-bold tracking-tight">Soumettre une offre</h2>
</div>
<button class="text-slate-400 hover:text-slate-100 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="p-6 space-y-6 overflow-y-auto max-h-[80vh]">
<!-- Mission Summary Card -->
<div class="bg-slate-900/50 rounded-xl p-4 border border-white/5">
<div class="flex items-start justify-between mb-3">
<div>
<p class="text-primary font-bold text-sm tracking-wider uppercase">Mission #045</p>
<h3 class="text-slate-100 text-lg font-semibold mt-1">Bobo-Dioulasso → Ouagadougou</h3>
</div>
<div class="bg-primary/20 text-primary px-3 py-1 rounded-full text-xs font-bold">
                            Disponible
                        </div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex items-center gap-2 text-slate-400">
<span class="material-symbols-outlined text-sm">route</span>
<span class="text-sm">360 km</span>
</div>
<div class="flex items-center gap-2 text-slate-400">
<span class="material-symbols-outlined text-sm">schedule</span>
<span class="text-sm">4h 30min</span>
</div>
<div class="flex items-center gap-2 text-slate-400">
<span class="material-symbols-outlined text-sm">weight</span>
<span class="text-sm">500 kg</span>
</div>
<div class="flex items-center gap-2 text-slate-400">
<span class="material-symbols-outlined text-sm">inventory_2</span>
<span class="text-sm">Produits agricoles</span>
</div>
</div>
</div>
<!-- Input Field: Delivery Rate -->
<div class="space-y-2">
<label class="block text-slate-200 text-sm font-semibold mb-2">Votre tarif de livraison</label>
<div class="relative">
<input class="w-full bg-slate-900 border border-slate-700 rounded-lg py-4 px-4 text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-xl font-bold" placeholder="0" type="number" value="15000"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
<span class="text-slate-400 font-bold">FCFA</span>
</div>
</div>
<p class="text-slate-500 text-sm italic mt-2">
                        Fourchette habituelle sur ce trajet : 12 000 – 18 000 FCFA
                    </p>
</div>
<!-- Textarea: Message -->
<div class="space-y-2">
<label class="block text-slate-200 text-sm font-semibold mb-2">Message pour l'acheteur (optionnel)</label>
<div class="relative">
<textarea class="w-full bg-slate-900 border border-slate-700 rounded-lg p-4 text-slate-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none" placeholder="Précisez vos disponibilités ou conditions particulières..." rows="3">Je suis disponible dès demain matin pour le chargement.</textarea>
<div class="text-right mt-1">
<span class="text-xs text-slate-500">52 / 200</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-4 pt-4">
<button class="flex-1 px-6 py-4 rounded-xl border border-slate-700 text-slate-300 font-semibold hover:bg-slate-800 transition-colors">
                        Annuler
                    </button>
<button class="flex-[2] px-6 py-4 rounded-xl bg-primary text-white font-bold hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">send</span>
                        Envoyer mon offre
                    </button>
</div>
</div>
<!-- Bottom Spacer for iOS devices/Mobile navigation -->
<div class="h-8 bg-background-dark"></div>
</div>
</div>
<!-- Background Content Mock (Blurred) -->
<div class="p-8 space-y-6 opacity-20 pointer-events-none">
<div class="h-8 w-48 bg-slate-700 rounded"></div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="h-40 bg-slate-800 rounded-xl"></div>
<div class="h-40 bg-slate-800 rounded-xl"></div>
<div class="h-40 bg-slate-800 rounded-xl"></div>
<div class="h-40 bg-slate-800 rounded-xl"></div>
</div>
</div>
</body></html>
