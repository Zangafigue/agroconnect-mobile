<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a34a",
                        "background-light": "#f6f8f6",
                        "background-dark": "#061109",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .password-strength-step {
            height: 4px;
            flex: 1;
            border-radius: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-slate-100 font-display min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden p-6 sm:p-8">
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-3xl">gleaf</span>
<h1 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">AgroConnect BF</h1>
</div>
<h2 class="text-slate-900 dark:text-white text-2xl font-bold">Créer votre compte</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Rejoignez la communauté agricole</p>
</div>
<form class="space-y-4">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Prénom</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-primary focus:border-primary px-4 py-3 text-sm" placeholder="Moussa" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Nom</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-primary focus:border-primary px-4 py-3 text-sm" placeholder="Traoré" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-primary focus:border-primary px-4 py-3 text-sm" placeholder="votre@email.com" type="email"/>
</div>
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Mot de passe</label>
<div class="relative">
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-primary focus:border-primary px-4 py-3 text-sm pr-10" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Confirmer le mot de passe</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-primary focus:border-primary px-4 py-3 text-sm" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-3 pt-2">
<div class="flex gap-1.5">
<div class="password-strength-step bg-primary"></div>
<div class="password-strength-step bg-primary"></div>
<div class="password-strength-step bg-primary/20 dark:bg-slate-700"></div>
<div class="password-strength-step bg-primary/20 dark:bg-slate-700"></div>
</div>
<div class="grid grid-cols-2 gap-y-2 text-[11px] text-slate-500 dark:text-slate-400">
<div class="flex items-center gap-1.5 text-primary">
<span class="material-symbols-outlined text-[14px] font-bold">check</span>
                        8 caractères minimum
                    </div>
<div class="flex items-center gap-1.5 text-primary">
<span class="material-symbols-outlined text-[14px] font-bold">check</span>
                        Un chiffre
                    </div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">close</span>
                        Une majuscule
                    </div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">close</span>
                        Un caractère spécial
                    </div>
</div>
</div>
<div class="space-y-3 pt-4">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Je suis un :</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-primary bg-primary/10 dark:bg-primary/20 text-primary transition-all" type="button">
<span class="material-symbols-outlined mb-1">potted_plant</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Agriculteur</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:border-primary/50 transition-all" type="button">
<span class="material-symbols-outlined mb-1">shopping_cart</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Acheteur</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:border-primary/50 transition-all" type="button">
<span class="material-symbols-outlined mb-1">local_shipping</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Transporteur</span>
</button>
</div>
</div>
<button class="w-full bg-primary hover:bg-green-700 text-white font-semibold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all mt-6" type="submit">
                Créer mon compte
            </button>
</form>
<div class="mt-8 text-center">
<a class="text-sm font-medium text-primary hover:text-green-700 transition-colors flex items-center justify-center gap-1" href="#">
                Déjà un compte ? Se connecter
                <span class="material-symbols-outlined text-[18px]">arrow_right_alt</span>
</a>
</div>
</div>
</body></html>
