<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AgroConnect BF - Confirmation de Commande</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              green: '#16a34a',
              dark: '#121212',
              surface: '#1e1e1e',
              border: '#333333'
            }
          }
        }
      }
    }
  </script>
<style data-purpose="custom-layout">body {
    background-color: #000;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif
    }
.bottom-sheet {
    border-radius: 24px 24px 0 0;
    background-color: #121212
    }
.map-container {
    background-color: #2a2a2a;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDgII3eX8e4OkHs3DvFwo055_Fv4CCyhmuQjxwpLRMzm_PyjVdG421yA0pwBA_cNT4vEIjm5y6KnUY9xQwRfwbxzIWeQH9Z9PUT6h9kvTJPtm4G434zzZ-m3TJ5H_nuXUXyvN7YUjs_FKHPtg3YJJ3pr938wmNiu_HFq0NsMrHxohKhF2_BlydcnKsHehqYW_2UfHDvzOogd5ScqU1l2TsXms2Vgq26utSqWRUy4H8MTx8bo_fLI-jwfI0gy21UITgZznnXWXZ2ffw);
    background-size: cover;
    background-position: center
    }</style>
</head>
<body class="flex items-end justify-center min-h-screen bg-black/60">
<!-- BEGIN: BottomSheetModal -->
<main class="bottom-sheet w-full max-w-md p-6 shadow-2xl ring-1 ring-white/10" data-purpose="confirmation-modal">
<!-- Handle bar for visual cue -->
<div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-6"></div>
<!-- Header Section -->
<header class="mb-6">
<h1 class="text-xl font-bold text-white flex items-center gap-2">
<span class="material-icons text-brand-green">assignment_turned_in</span>
        Confirmer la commande #045
      </h1>
</header>
<!-- BEGIN: OrderSummary -->
<section class="mb-6 p-4 rounded-xl bg-brand-surface border border-brand-border" data-purpose="order-summary">
<div class="flex justify-between items-start mb-3">
<div>
<p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Acheteur</p>
<p class="text-white font-medium">Fatima Traoré</p>
</div>
<div class="text-right">
<p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Produit</p>
<p class="text-white">Maïs sec (100 sacs)</p>
<p class="text-sm text-gray-500">500 kg</p>
</div>
</div>
<div class="pt-3 border-t border-brand-border flex justify-between items-center">
<div>
<p class="text-xs text-gray-400">Total Brut</p>
<p class="text-gray-300 text-sm line-through">500,000 FCFA</p>
</div>
<div class="text-right">
<p class="text-xs text-brand-green font-bold">Net à recevoir</p>
<p class="text-lg font-bold text-brand-green">485,000 FCFA</p>
</div>
</div>
</section>
<!-- END: OrderSummary -->
<!-- BEGIN: CollectionAddress -->
<section class="mb-6" data-purpose="collection-details">
<h2 class="text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wide">Adresse de collecte</h2>
<div class="flex items-start gap-3 mb-3">
<span class="material-icons text-brand-green mt-1">location_on</span>
<div>
<p class="text-white font-medium">Bobo-Dioulasso</p>
<p class="text-gray-400 text-sm">Secteur 22, marché central</p>
</div>
</div>
<!-- Interactive Map Mockup -->
<div class="map-container w-full h-32 rounded-xl relative overflow-hidden mb-4 border border-brand-border">
<!-- Marker Mockup -->
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-icons text-brand-green text-4xl drop-shadow-md">place</span>
</div>
<div class="absolute bottom-2 left-2 bg-black/50 backdrop-blur-sm px-2 py-1 rounded text-[10px] text-white">
          © OpenStreetMap contributors
        </div>
</div>
</section>
<!-- END: CollectionAddress -->
<!-- BEGIN: FormControls -->
<section class="space-y-4 mb-8" data-purpose="form-inputs">
<!-- Availability Dropdown -->
<div>
<label class="block text-sm font-medium text-gray-400 mb-1" for="availability">Disponibilité</label>
<div class="relative">
<select class="w-full bg-brand-surface border-brand-border text-white rounded-lg py-3 pl-4 pr-10 focus:ring-brand-green focus:border-brand-green appearance-none" id="availability">
<option>Dès maintenant</option>
<option>Demain matin</option>
<option>Fin de semaine</option>
</select>
<span class="material-icons absolute right-3 top-3 text-gray-500 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Instructions Textarea -->
<div>
<label class="block text-sm font-medium text-gray-400 mb-1" for="instructions">Instructions pour le transporteur</label>
<textarea class="w-full bg-brand-surface border-brand-border text-white rounded-lg py-2 px-4 focus:ring-brand-green focus:border-brand-green placeholder-gray-600" id="instructions" placeholder="Ex: Entrée côté nord du marché..." rows="2"></textarea>
</div>
</section>
<!-- END: FormControls -->
<!-- BEGIN: ActionButtons -->
<footer class="flex flex-col gap-3">
<button class="w-full py-4 bg-brand-green hover:bg-green-700 text-white font-bold rounded-xl transition-colors flex justify-center items-center gap-2">
<span>Confirmer et publier la mission</span>
</button>
<button class="w-full py-3 bg-transparent border border-brand-border text-gray-400 hover:text-white hover:bg-brand-surface font-medium rounded-xl transition-all">
        Annuler
      </button>
</footer>
<!-- END: ActionButtons -->
</main>
<!-- END: BottomSheetModal -->
<script data-purpose="ui-interactivity">
    // Placeholder for interaction logic
    document.querySelector('.bg-brand-green').addEventListener('click', function() {
      console.log('Order #045 Confirmed');
    });
  </script>
</body></html>
