<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2f7f33",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .map-gradient {
            background: radial-gradient(circle at center, transparent 0%, rgba(20, 30, 21, 0.4) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Full Screen Map Layer -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-slate-800 relative overflow-hidden bg-cover bg-center" data-alt="Satellite map view showing a road between Koudougou and Ouagadougou" data-location="Burkina Faso, Koudougou to Ouagadougou" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDLWnIsJkV__owDkNGUuFKjZ6TRx3ESUxlHSWqazHKSvyzYojWK99_QYdpLczXuLf_Q-WKSDxnWW51deLQy45I6JQ2t72jhH9k8WCXA7l1GArONEH2Mn7MjGSgMw8NFVDXzn_trp_doGob6FF2rmCPmsd9wiWiKxzhWpVSs0KErhVPQiOOESKqUhQAv_yYPc7DSvkjPPi5Ccq1Zar_I3o9S8VyM8nGPc6WXo4jafRjEbC0yOAV7Bvg9D25sY78TNzxQfD_NXLJfN-I');">
<!-- Visual Trajectory Simulation (SVG Overlay) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 1000 1000">
<!-- Route Line -->
<path d="M 300 600 Q 500 500 700 400" fill="transparent" stroke="#2f7f33" stroke-dasharray="12 8" stroke-width="6"></path>
<!-- Origin Marker (Green) -->
<circle cx="300" cy="600" fill="#2f7f33" r="8"></circle>
<!-- Destination Marker (Red) -->
<circle cx="700" cy="400" fill="#ef4444" r="8"></circle>
<!-- Truck Marker (Blue) -->
<g transform="translate(500, 500)">
<circle class="animate-pulse" cx="0" cy="0" fill="#3b82f6" r="14"></circle>
<text class="material-symbols-outlined text-white text-[16px]" x="-8" y="6">local_shipping</text>
</g>
</svg>
<div class="absolute inset-0 map-gradient"></div>
</div>
</div>
<!-- Floating Header -->
<header class="absolute top-0 left-0 right-0 z-20 p-4">
<div class="mx-auto max-w-5xl">
<div class="flex items-center gap-4 bg-background-dark/80 backdrop-blur-md p-3 rounded-xl border border-primary/20 shadow-2xl">
<button class="flex size-10 items-center justify-center rounded-lg bg-primary/10 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="flex-1">
<h1 class="text-slate-100 font-bold text-lg leading-tight uppercase">Livraison #041 — EN ROUTE</h1>
<p class="text-primary text-[10px] font-bold uppercase tracking-widest">Mise à jour il y a 2 min</p>
</div>
<button class="flex size-10 items-center justify-center rounded-lg hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-slate-400">more_vert</span>
</button>
</div>
</div>
</header>
<!-- Map Controls -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 z-20 flex flex-col gap-2">
<div class="flex flex-col rounded-xl overflow-hidden shadow-xl border border-primary/10">
<button class="size-11 flex items-center justify-center bg-background-dark/90 hover:bg-background-dark text-slate-100 transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<div class="h-px bg-primary/10"></div>
<button class="size-11 flex items-center justify-center bg-background-dark/90 hover:bg-background-dark text-slate-100 transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
<button class="size-11 flex items-center justify-center rounded-xl bg-background-dark/90 hover:bg-background-dark text-primary shadow-xl border border-primary/10 transition-colors">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<!-- Bottom Info Panel -->
<div class="absolute bottom-0 left-0 right-0 z-20 p-4 pb-8">
<div class="mx-auto max-w-2xl bg-[#1a241c] rounded-[2rem] shadow-2xl overflow-hidden border border-primary/20">
<!-- Progress Indicator Handle -->
<div class="flex justify-center pt-3">
<div class="w-12 h-1 rounded-full bg-primary/20"></div>
</div>
<div class="p-6 pt-4 flex flex-col gap-6">
<!-- Route Labels -->
<div class="flex items-start gap-4">
<div class="flex flex-col items-center pt-1 shrink-0">
<span class="material-symbols-outlined text-primary text-[18px]">radio_button_checked</span>
<div class="w-px h-8 bg-primary/20 my-1"></div>
<span class="material-symbols-outlined text-red-500 text-[18px]">location_on</span>
</div>
<div class="flex-1 flex flex-col gap-4">
<div>
<p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">ORIGINE</p>
<p class="text-sm font-semibold text-slate-100">Koudougou, Secteur 5</p>
</div>
<div>
<p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">DESTINATION</p>
<p class="text-sm font-semibold text-slate-100">Ouagadougou, Marché de Gounghin</p>
</div>
</div>
</div>
<!-- Chips Info -->
<div class="flex gap-2 flex-wrap">
<div class="px-4 py-2 rounded-full bg-primary/10 flex items-center gap-2 border border-primary/5">
<span class="material-symbols-outlined text-sm text-primary">distance</span>
<span class="text-xs font-bold text-slate-100">100 km</span>
</div>
<div class="px-4 py-2 rounded-full bg-primary/10 flex items-center gap-2 border border-primary/5">
<span class="material-symbols-outlined text-sm text-primary">schedule</span>
<span class="text-xs font-bold text-slate-100">1h 30m</span>
</div>
<div class="px-4 py-2 rounded-full bg-primary/10 flex items-center gap-2 border border-primary/5">
<span class="material-symbols-outlined text-sm text-primary">weight</span>
<span class="text-xs font-bold text-slate-100">200 kg</span>
</div>
</div>
<!-- Action Buttons -->
<div class="grid grid-cols-2 gap-3 pt-2">
<button class="flex items-center justify-center gap-2 h-14 rounded-2xl border border-primary/30 text-primary font-bold text-sm hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-xl">sync</span>
                        Mettre à jour position
                    </button>
<button class="flex items-center justify-center gap-2 h-14 rounded-2xl bg-primary text-white font-bold text-sm hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all active:scale-95">
<span class="material-symbols-outlined text-xl">check_circle</span>
                        Confirmer la livraison
                    </button>
</div>
</div>
</div>
</div>
</div>
</body></html>
