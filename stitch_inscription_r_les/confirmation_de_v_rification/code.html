<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2f7f33",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">
<!-- Success Feedback Container -->
<div class="max-w-md w-full flex flex-col items-center text-center space-y-8">
<!-- Large Checkmark Icon with Glow -->
<div class="relative">
<div class="absolute inset-0 bg-primary/30 blur-2xl rounded-full scale-150"></div>
<div class="relative bg-primary text-white w-24 h-24 rounded-full flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-6xl">check_circle</span>
</div>
</div>
<!-- Text Content -->
<div class="space-y-4">
<h1 class="text-3xl font-bold text-slate-100">
                Compte vérifié !
            </h1>
<p class="text-lg text-slate-400">
                Bienvenue sur AgroConnect BF, Moussa 👋
            </p>
</div>
<!-- Transition & Loading Indicator -->
<div class="flex flex-col items-center space-y-4">
<p class="text-sm text-slate-500 font-medium">
                Redirection automatique dans 3 secondes...
            </p>
<!-- Loading Dots -->
<div class="flex space-x-2">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-40"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-70"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
</div>
</div>
<!-- Manual Action Link -->
<div class="pt-12">
<a class="inline-flex items-center text-primary font-semibold hover:text-primary/80 transition-colors group" href="#">
                Aller à mon dashboard maintenant
                <span class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</a>
</div>
</div>
<!-- Background Decorative Element (Optional subtle texture) -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full opacity-10 bg-[radial-gradient(circle_at_center,theme(colors.primary)_0%,transparent_70%)]" data-alt="Abstract green radial gradient background"></div>
</div>
</body></html>
