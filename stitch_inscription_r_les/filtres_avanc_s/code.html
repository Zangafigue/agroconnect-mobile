<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2f7f33",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Filtres Avancés - Catalogue</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<!-- Mock Content Background (Catalogue List) -->
<div class="fixed inset-0 p-4 opacity-40 pointer-events-none">
<div class="grid grid-cols-2 gap-4">
<div class="h-48 rounded-xl bg-primary/10 border border-primary/20"></div>
<div class="h-48 rounded-xl bg-primary/10 border border-primary/20"></div>
<div class="h-48 rounded-xl bg-primary/10 border border-primary/20"></div>
<div class="h-48 rounded-xl bg-primary/10 border border-primary/20"></div>
</div>
</div>
<!-- Overlay Background -->
<div class="fixed inset-0 bg-background-dark/80 backdrop-blur-sm z-40"></div>
<!-- Bottom Sheet Container -->
<div class="fixed inset-x-0 bottom-0 z-50 flex flex-col items-center justify-end max-h-[95vh]">
<div class="w-full max-w-2xl bg-background-light dark:bg-background-dark rounded-t-xl shadow-2xl border-t border-primary/20 flex flex-col">
<!-- BottomSheetHandle -->
<button class="flex h-6 w-full items-center justify-center pt-2 group">
<div class="h-1.5 w-12 rounded-full bg-primary/30 group-hover:bg-primary/50 transition-colors"></div>
</button>
<!-- Header -->
<div class="flex items-center p-4 border-b border-primary/10">
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight flex-1">Filtres</h2>
<button class="text-primary hover:text-primary/80 text-sm font-semibold transition-colors">Réinitialiser</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto p-4 space-y-8">
<!-- Price Range Section -->
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-6">Fourchette de prix</h3>
<div class="px-2">
<div class="relative w-full h-2 bg-primary/20 rounded-full">
<div class="absolute left-0 right-[15%] h-full bg-primary rounded-full"></div>
<div class="absolute left-0 -top-2.5 flex flex-col items-center">
<div class="size-5 rounded-full bg-primary border-4 border-background-dark ring-2 ring-primary/20"></div>
<span class="text-xs font-medium mt-6">0 FCFA</span>
</div>
<div class="absolute right-[15%] -top-2.5 flex flex-col items-center">
<div class="size-5 rounded-full bg-primary border-4 border-background-dark ring-2 ring-primary/20"></div>
<span class="text-xs font-medium mt-6">500 000 FCFA</span>
</div>
</div>
</div>
</section>
<!-- Location Section -->
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4">Localisation</h3>
<div class="space-y-4">
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/60">location_on</span>
<input class="w-full pl-10 pr-4 py-3 bg-primary/5 border border-primary/20 rounded-lg focus:ring-primary focus:border-primary outline-none transition-all text-slate-100" placeholder="Rechercher une ville..." type="text"/>
</div>
<div class="pt-4">
<div class="flex justify-between mb-2">
<label class="text-sm text-slate-400">Distance maximale</label>
<span class="text-sm font-bold text-primary">200 km</span>
</div>
<input class="w-full h-2 bg-primary/20 rounded-lg appearance-none cursor-pointer accent-primary" max="500" min="0" type="range" value="200"/>
</div>
</div>
</section>
<!-- Categories Section -->
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4">Catégories</h3>
<div class="grid grid-cols-2 gap-3">
<label class="flex items-center p-3 rounded-lg bg-primary/5 border border-primary/10 cursor-pointer hover:bg-primary/10 transition-colors">
<input checked="" class="rounded border-primary/30 text-primary focus:ring-primary bg-background-dark" type="checkbox"/>
<span class="ml-3 text-sm font-medium">Céréales</span>
</label>
<label class="flex items-center p-3 rounded-lg bg-primary/5 border border-primary/10 cursor-pointer hover:bg-primary/10 transition-colors">
<input class="rounded border-primary/30 text-primary focus:ring-primary bg-background-dark" type="checkbox"/>
<span class="ml-3 text-sm font-medium">Légumes</span>
</label>
<label class="flex items-center p-3 rounded-lg bg-primary/5 border border-primary/10 cursor-pointer hover:bg-primary/10 transition-colors">
<input class="rounded border-primary/30 text-primary focus:ring-primary bg-background-dark" type="checkbox"/>
<span class="ml-3 text-sm font-medium">Fruits</span>
</label>
<label class="flex items-center p-3 rounded-lg bg-primary/5 border border-primary/10 cursor-pointer hover:bg-primary/10 transition-colors">
<input class="rounded border-primary/30 text-primary focus:ring-primary bg-background-dark" type="checkbox"/>
<span class="ml-3 text-sm font-medium">Élevage</span>
</label>
<label class="flex items-center p-3 rounded-lg bg-primary/5 border border-primary/10 cursor-pointer hover:bg-primary/10 transition-colors">
<input class="rounded border-primary/30 text-primary focus:ring-primary bg-background-dark" type="checkbox"/>
<span class="ml-3 text-sm font-medium">Semences</span>
</label>
<label class="flex items-center p-3 rounded-lg bg-primary/5 border border-primary/10 cursor-pointer hover:bg-primary/10 transition-colors">
<input class="rounded border-primary/30 text-primary focus:ring-primary bg-background-dark" type="checkbox"/>
<span class="ml-3 text-sm font-medium">Autres</span>
</label>
</div>
</section>
<!-- Availability Section -->
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4">Disponibilité</h3>
<div class="flex gap-2">
<button class="flex-1 py-2 rounded-lg border border-primary/20 bg-primary/5 text-sm font-medium hover:bg-primary/10 transition-colors">Tous</button>
<button class="flex-1 py-2 rounded-lg border border-primary bg-primary text-slate-100 text-sm font-bold shadow-lg shadow-primary/20">En stock</button>
</div>
</section>
</div>
<!-- Footer Action -->
<div class="p-4 bg-background-light dark:bg-background-dark border-t border-primary/10">
<button class="w-full bg-[#16a34a] hover:bg-[#15803d] text-white font-bold py-4 rounded-xl shadow-lg shadow-[#16a34a]/30 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">filter_list</span>
                    Appliquer les filtres
                </button>
</div>
</div>
</div>
</body></html>
