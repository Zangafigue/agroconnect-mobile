<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AgroConnect BF - Mot de passe oublié</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2f7f33",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-md h-full flex flex-col">
<!-- Header with Back Button -->
<div class="flex items-center mb-8">
<button class="text-slate-900 dark:text-slate-100 p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
</div>
<!-- Central Card Content -->
<div class="bg-primary/5 dark:bg-primary/10 border border-primary/20 rounded-2xl p-8 shadow-2xl backdrop-blur-sm">
<!-- Lock Icon Section -->
<div class="flex justify-center mb-6">
<div class="bg-primary/20 p-5 rounded-full">
<span class="material-symbols-outlined text-primary text-5xl">lock_open</span>
</div>
</div>
<!-- Title & Subtitle -->
<div class="text-center mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold mb-3 tracking-tight">
                    Mot de passe oublié ?
                </h1>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">
                    Entrez votre adresse email. Nous vous enverrons un code à 6 chiffres pour réinitialiser votre mot de passe.
                </p>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium ml-1">
                        Email
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 text-xl">mail</span>
<input class="w-full bg-white dark:bg-primary/5 border border-primary/30 dark:border-primary/20 rounded-xl py-4 pl-12 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-primary/40 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="votre@email.com" type="email"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span>Envoyer le code</span>
<span class="material-symbols-outlined text-xl">send</span>
</button>
</form>
<!-- Bottom Link -->
<div class="mt-8 text-center">
<a class="text-primary hover:text-primary/80 font-semibold text-sm flex items-center justify-center gap-2" href="#">
<span class="material-symbols-outlined text-lg">west</span>
                    Retour au login
                </a>
</div>
</div>
<!-- App Branding/Footer (Optional for Mobile View) -->
<div class="mt-auto py-8 text-center">
<p class="text-slate-500 dark:text-primary/40 text-xs font-medium uppercase tracking-widest">
                AgroConnect BF
            </p>
</div>
</div>
</body></html>
