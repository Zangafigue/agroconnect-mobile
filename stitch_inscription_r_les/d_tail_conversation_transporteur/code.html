<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AgroConnect BF - Chat Detail</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a34a",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 px-4 py-3 flex items-center gap-3">
<button class="flex items-center justify-center p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<div class="flex flex-1 items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/20 bg-cover bg-center border border-primary/30" data-alt="Portrait of a Burkinabé farmer wearing a hat" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCKzPG0uZOKVOi9a0O2Ifk6IcPTmt7tcYmgRSAWTx9QFb-I_8lZ3hmQqHJfsYzzPgFebqX9TDshn1v3brD37XsQCgn6wLbQheXt3jCo3nkrRLVO37lqP7t5kBSshwV772Y2EugQpriprHr0DEXfz1wKziNATJbbcQu_ko-w3y6czwRBsyHktyCe7azU0EeSFbyLvzX6QrVXIVvm-ZDvHampgWcNCov4BTRw4db-8fBZmmmBietBWwvv-CK7oKEbAkvVly97mqyTbGI')">
</div>
<div class="flex flex-col">
<h1 class="text-sm font-bold leading-none mb-1">Amadou K.</h1>
<span class="text-[11px] text-primary font-medium uppercase tracking-wider">Agriculteur • Commande #041</span>
</div>
</div>
<button class="flex items-center justify-center p-2 text-primary hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">call</span>
</button>
</header>
<!-- Chat Content Area -->
<main class="flex-1 overflow-y-auto p-4 flex flex-col gap-6">
<!-- Date Divider -->
<div class="flex justify-center my-2">
<span class="text-[11px] font-semibold text-slate-500 dark:text-slate-400 bg-primary/5 dark:bg-primary/10 px-3 py-1 rounded-full uppercase tracking-widest">Aujourd'hui</span>
</div>
<!-- Incoming Message (Farmer) -->
<div class="flex flex-col gap-1 items-start max-w-[85%]">
<div class="flex items-end gap-2">
<div class="w-8 h-8 rounded-full bg-primary/20 bg-cover bg-center shrink-0 border border-primary/20" data-alt="Small avatar of Farmer Amadou K." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCX9W4KAt0QMRAdRrAg2P2bC2dJcaUY1tPY1RKrvWgxHCw0nJk3nkVj-AB4CBNJdJg6AudbjzPeXSW3z9ELqV4ok6JmwcQfz5N2qwPJ4WkyP51ES_D6N0cU11DL7QsSMoRHZFqooPDGwmETdeO8COyBsRC8tdfycfflY0FUsoNA9rJG1xZLBrgNCBnaLy2jpec48TbrDo_4dUA3Htp3qbhODQr-YBtuPZrFU0vNN-McnU3hxP8pHzgek9Y5tTkq8-2mIvtFT2_sPx4')">
</div>
<div class="flex flex-col">
<div class="bg-slate-200 dark:bg-primary/10 rounded-2xl rounded-bl-none px-4 py-3 shadow-sm">
<p class="text-sm leading-relaxed">Bonjour Koné, les 50 sacs de maïs sont prêts pour l'enlèvement.</p>
</div>
<span class="text-[10px] text-slate-500 mt-1 ml-1">09:15</span>
</div>
</div>
</div>
<!-- Outgoing Message (Transporter Koné) -->
<div class="flex flex-col gap-1 items-end self-end max-w-[85%]">
<div class="flex flex-col items-end">
<div class="bg-primary text-white rounded-2xl rounded-br-none px-4 py-3 shadow-md">
<p class="text-sm leading-relaxed">Parfait, j'arrive d'ici 30 minutes à Koudougou.</p>
</div>
<div class="flex items-center gap-1 mt-1 mr-1">
<span class="text-[10px] text-slate-500">09:20</span>
<span class="material-symbols-outlined text-[12px] text-primary">done_all</span>
</div>
</div>
</div>
<!-- Incoming Message (Farmer) -->
<div class="flex flex-col gap-1 items-start max-w-[85%]">
<div class="flex items-end gap-2">
<div class="w-8 h-8 rounded-full bg-primary/20 bg-cover bg-center shrink-0 border border-primary/20" data-alt="Small avatar of Farmer Amadou K." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCWa25i3jSO1QmQas_RUap8hV5Go0Yvffm5kIOceD975MgtZeEA84fxp8o9E18ivMNdgmIjbIc4s5Wfx18qZ-LloStiYkYy-AsfvPn0hZiWDqEusYID0cV7MqDScqyjc47pnnaHtu27lGunVvK3MvxwCTkNaKAFGDzsctzRCuY0EKlJjeuEi6ewhnotKZcYyVxFMfGymG2spkhaxaZeFLJw_6mI-EqJYmsqDkHp6B3NCtA7ZqtWIX_-6MgG5NVAiocuF8Xf2v2iH8o')">
</div>
<div class="flex flex-col">
<div class="bg-slate-200 dark:bg-primary/10 rounded-2xl rounded-bl-none px-4 py-3 shadow-sm">
<p class="text-sm leading-relaxed">D'accord, je vous attends au Secteur 5.</p>
</div>
<span class="text-[10px] text-slate-500 mt-1 ml-1">09:22</span>
</div>
</div>
</div>
</main>
<!-- Bottom Input Area -->
<div class="p-4 bg-background-light dark:bg-background-dark border-t border-primary/10">
<div class="flex items-center gap-2 bg-slate-100 dark:bg-primary/5 rounded-full px-2 py-1.5 border border-primary/10">
<button class="p-2 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">attach_file</span>
</button>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2 px-1 dark:placeholder-slate-500" placeholder="Écrire un message..." type="text"/>
<button class="bg-primary text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined">send</span>
</button>
</div>
<!-- Safety spacing for mobile bars -->
<div class="h-4"></div>
</div>
</body></html>
