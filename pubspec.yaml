name: agroconnect_bf
description: Plateforme agricole du Burkina Faso
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.0.0

  # HTTP
  dio: ^5.4.3

  # Stockage local
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Cartographie GRATUITE (OpenStreetMap — aucune clé API)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  http: ^1.2.1

  # UI
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  intl: ^0.19.0
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1   # OTP input avec cases séparées

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
